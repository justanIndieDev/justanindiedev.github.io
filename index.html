<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ACE_OS V12</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT SCREEN -->
<div id="bootScreen">
  <div class="bootText" id="bootText"></div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">

<header>
  <h1>ACE_OS // SYSTEM ONLINE</h1>
</header>

<div class="terminal">

  <div class="block" id="output">
> SYSTEM READY
  </div>

  <div class="block">
    <span>> </span>
    <input id="cmdInput" autocomplete="off" placeholder="enter command..." />
  </div>

  <div class="block">
    > DEV ACCESS PANEL<br>
    <input id="devPass" placeholder="security key..." onkeydown="if(event.key==='Enter') tryUnlockDev()" />
    <div id="loginMsg"></div>
  </div>

</div>

<footer>
  ACE_OS V12 // STABLE NODE
</footer>

</div>

<!-- SFX -->
<audio id="sfxBoot" src="assets/boot.wav"></audio>
<audio id="sfxKey" src="assets/key.wav"></audio>
<audio id="sfxError" src="assets/error.wav"></audio>
<audio id="sfxGlitch" src="assets/glitch.wav"></audio>

<script src="app.js"></script>

</body>
</html>
