<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACE_OS V12</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT -->
<div id="bootScreen">
  <div id="bootText"></div>
</div>

<!-- MAIN OS -->
<div id="mainOS" style="display:none;">

<header>
  <h1>ACE_OS V12</h1>
  <p>PORTFOLIO INTERFACE</p>
</header>

<!-- COMMANDS -->
<div class="commandBar">

  <div class="cmd" onclick="runCommand('projects')">> open projects</div>
  <div class="cmd" onclick="runCommand('about')">> open about</div>
  <div class="cmd" onclick="runCommand('skills')">> open skills</div>
  <div class="cmd" onclick="runCommand('contact')">> open contact</div>
  <div class="cmd" onclick="runCommand('clear')">> clear</div>

</div>

<!-- OUTPUT -->
<div class="terminalWindow">

  <div class="windowTop">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
    TERMINAL
  </div>

  <div id="output">
    <div class="line">> SYSTEM READY</div>
  </div>

</div>

<footer>
ACE_OS V12 // ONLINE
</footer>

</div>

<!-- AUDIO -->
<audio id="bootSfx" src="assets/boot.wav"></audio>

<script src="app.js"></script>

</body>
</html>
